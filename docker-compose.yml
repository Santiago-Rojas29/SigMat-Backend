services:
  db:
    image: postgres:14.3
    restart: always
    container_name: sigmat
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    container_name: sigmat-redis
    ports:
      - "6379:6379"
